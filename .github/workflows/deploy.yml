name: Verify and deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  verify-build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout clean full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install locked Node metadata
        run: npm ci --ignore-scripts
      - name: Install pinned Python runtime dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Run source, leak, history, and public-object checks
        run: npm run check
      - name: Run synthetic unit, fault-injection, and smoke tests
        run: npm test
      - name: Build verified Pages artifact
        run: npm run build
      - name: Recheck final artifact and clean checkout
        run: |
          node scripts/check_dist.mjs
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Upload verified Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: verify-build
    runs-on: ubuntu-latest
    permissions:
      contents: none
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Deploy immutable verified artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
