<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Print Drive</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="true"></div>

    <main class="container">
        <section class="auth-view" id="auth-view" hidden>
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">PD</span>
                <h1>Print Drive</h1>
            </div>
            <p class="auth-copy">공개 저장소에는 암호화된 파일만 있으며, 비밀번호는 이 브라우저 안에서만 복호화에 사용됩니다.</p>
            <form class="password-form" id="password-form">
                <label for="password-input">암호화 비밀번호</label>
                <div class="password-row">
                    <input id="password-input" type="password" autocomplete="current-password" placeholder="비밀번호 입력">
                    <button type="submit" id="auth-submit">열기</button>
                </div>
                <label class="remember-row">
                    <input id="remember-session" type="checkbox">
                    이 탭에서 새로고침해도 유지. 공용 PC에서는 체크하지 마세요
                </label>
                <p class="form-message" id="auth-error" hidden></p>
            </form>
        </section>

        <section class="state-view" id="loading-view" hidden>
            <div class="spinner" aria-hidden="true"></div>
            <p class="loading-text">암호화된 목록을 확인하는 중입니다...</p>
        </section>

        <section id="app-view" hidden>
            <div class="loading-overlay" id="global-loader" hidden>
                <div class="spinner" aria-hidden="true"></div>
                <p class="loading-text" id="loading-message">처리 중입니다...</p>
            </div>

            <header class="header">
                <div class="brand">
                    <span class="brand-mark" aria-hidden="true">PD</span>
                    <div class="title-block">
                        <h1>Print Drive</h1>
                        <p class="subtle">프린트할 파일을 잠깐 받아가는 곳입니다.</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="secondary" type="button" id="btn-install" hidden>설치</button>
                    <button class="secondary" type="button" id="btn-refresh">새로고침</button>
                    <button class="secondary" type="button" id="btn-lock">잠금</button>
                </div>
            </header>

            <section class="controls" aria-label="파일 검색 및 정렬">
                <div class="search-row">
                    <input id="search-input" type="search" placeholder="검색" autocomplete="off">
                    <select id="type-filter" aria-label="파일 타입 필터">
                        <option value="all">전체</option>
                        <option value="pdf">PDF</option>
                        <option value="image">이미지</option>
                        <option value="document">문서</option>
                        <option value="other">기타</option>
                    </select>
                    <select id="sort-select" aria-label="파일 정렬">
                        <option value="name">이름순</option>
                        <option value="size">크기순</option>
                        <option value="extension">확장자순</option>
                        <option value="api">기본순</option>
                    </select>
                </div>
                <div class="meta-row">
                    <span id="result-count">0개 표시</span>
                    <div class="list-tools">
                        <span class="selection-count" id="selected-count" hidden>선택 0개</span>
                        <button class="secondary selection-toggle" type="button" id="btn-selection-mode">선택</button>
                    </div>
                </div>
                <p class="filename-hint">권장: 2026-06-05_회로과제.pdf</p>
            </section>

            <section class="action-bar" aria-label="선택 작업">
                <button class="secondary" type="button" id="btn-select-all">전체</button>
                <button class="secondary" type="button" id="btn-clear-selection" disabled>해제</button>
                <button type="button" id="btn-download-selected" disabled>ZIP</button>
            </section>

            <ul id="file-list" aria-live="polite"></ul>
        </section>

        <noscript>
            <p>이 페이지는 암호화된 파일을 복호화하기 위해 JavaScript가 필요합니다.</p>
        </noscript>
    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
