<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <title>Print Drive</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="true"></div>

    <main class="container">
        <section class="auth-view" id="auth-view" hidden>
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">PD</span>
                <h1>Print Drive</h1>
            </div>
            <p class="auth-copy">공개 저장소에는 암호화된 파일만 있으며, 비밀번호는 이 브라우저 안에서만 복호화에 사용됩니다.</p>
            <form class="password-form" id="password-form">
                <label for="password-input">암호화 비밀번호</label>
                <div class="password-row">
                    <input id="password-input" type="password" autocomplete="current-password" placeholder="비밀번호 입력">
                    <button type="submit" id="auth-submit">잠금 해제</button>
                </div>
                <label class="remember-row">
                    <input id="remember-session" type="checkbox">
                    이 탭에서 새로고침해도 유지. 공용 PC에서는 체크하지 마세요
                </label>
                <p class="form-message" id="auth-error" hidden></p>
            </form>
        </section>

        <section class="state-view" id="loading-view" hidden>
            <div class="spinner" aria-hidden="true"></div>
            <p class="loading-text">암호화된 목록을 확인하는 중입니다...</p>
        </section>

        <section id="app-view" hidden>
            <div class="loading-overlay" id="global-loader" hidden>
                <div class="spinner" aria-hidden="true"></div>
                <p class="loading-text" id="loading-message">처리 중입니다...</p>
                <button class="secondary" type="button" id="btn-cancel-zip" hidden>취소</button>
            </div>

            <header class="header">
                <div class="brand">
                    <span class="brand-mark" aria-hidden="true">PD</span>
                    <div class="title-block">
                        <h1>Print Drive</h1>
                        <p class="subtle">프린트할 파일을 잠깐 받아가는 곳입니다.</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="secondary" type="button" id="btn-install" hidden>설치</button>
                    <button class="secondary" type="button" id="btn-page-qr">QR</button>
                    <button class="secondary" type="button" id="btn-refresh">새로고침</button>
                    <button class="secondary" type="button" id="btn-lock">잠금</button>
                </div>
            </header>

            <section class="controls" aria-label="파일 검색 및 정렬">
                <div class="search-row">
                    <div class="search-box">
                        <input id="search-input" type="search" placeholder="파일 검색" autocomplete="off">
                        <button class="ghost icon-only" type="button" id="btn-clear-search" aria-label="검색어 지우기" hidden>지우기</button>
                    </div>
                    <select id="sort-select" aria-label="파일 정렬">
                        <option value="recent">최근순</option>
                        <option value="name">이름순</option>
                        <option value="size">크기순</option>
                        <option value="extension">확장자순</option>
                        <option value="api">기본순</option>
                    </select>
                </div>
                <div class="filter-chips" id="filter-chips" role="group" aria-label="파일 타입 필터">
                    <button class="filter-chip active" type="button" data-filter="all" aria-pressed="true">전체</button>
                    <button class="filter-chip" type="button" data-filter="pdf" aria-pressed="false">PDF</button>
                    <button class="filter-chip" type="button" data-filter="image" aria-pressed="false">이미지</button>
                    <button class="filter-chip" type="button" data-filter="document" aria-pressed="false">문서</button>
                    <button class="filter-chip" type="button" data-filter="other" aria-pressed="false">기타</button>
                </div>
                <div class="meta-row">
                    <span id="file-summary">0개 파일 · 0 B · 최근 업데이트 없음</span>
                    <span id="result-count">0개 표시</span>
                    <div class="list-tools">
                        <button class="secondary" type="button" id="btn-download-all" disabled>전체 ZIP</button>
                        <span class="selection-count" id="selected-count" hidden>선택 0개</span>
                        <button class="secondary selection-toggle" type="button" id="btn-selection-mode">선택</button>
                    </div>
                </div>
            </section>

            <section class="action-bar" aria-label="선택 작업">
                <button class="secondary" type="button" id="btn-select-all">전체</button>
                <button class="secondary" type="button" id="btn-clear-selection" disabled>해제</button>
                <button type="button" id="btn-download-selected" disabled>선택 ZIP 다운로드</button>
            </section>

            <ul id="file-list" aria-live="polite" tabindex="-1"></ul>
        </section>

        <noscript>
            <p>이 페이지는 암호화된 파일을 복호화하기 위해 JavaScript가 필요합니다.</p>
        </noscript>
    </main>

    <section class="preview-modal" id="preview-modal" role="dialog" aria-modal="true" aria-labelledby="preview-title" hidden>
        <div class="preview-backdrop" id="preview-backdrop"></div>
        <div class="preview-panel">
            <header class="preview-header">
                <div>
                    <p class="preview-kicker" id="preview-meta">미리보기</p>
                    <h2 id="preview-title">파일 미리보기</h2>
                </div>
                <button class="secondary icon-only" type="button" id="btn-preview-close-top" aria-label="미리보기 닫기">닫기</button>
            </header>
            <div class="preview-body" id="preview-body"></div>
            <footer class="preview-footer">
                <button type="button" id="btn-preview-download">다운로드</button>
                <button class="secondary" type="button" id="btn-preview-print">인쇄</button>
                <button class="secondary" type="button" id="btn-preview-close">닫기</button>
            </footer>
        </div>
    </section>

    <section class="qr-modal" id="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-title" hidden>
        <div class="qr-backdrop" id="qr-backdrop"></div>
        <div class="qr-panel">
            <header class="qr-header">
                <div>
                    <p class="preview-kicker" id="qr-meta">QR 공유</p>
                    <h2 id="qr-title">현재 페이지 QR</h2>
                </div>
                <button class="secondary icon-only" type="button" id="btn-qr-close-top" aria-label="QR 닫기">닫기</button>
            </header>
            <div class="qr-body">
                <canvas id="qr-canvas" width="280" height="280"></canvas>
                <p id="qr-link" class="qr-link"></p>
            </div>
            <footer class="qr-footer">
                <button type="button" id="btn-qr-copy">링크 복사</button>
                <button class="secondary" type="button" id="btn-qr-close">닫기</button>
            </footer>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>

</html>
